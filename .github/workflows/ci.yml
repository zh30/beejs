name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ !startsWith(github.ref, 'refs/tags/') }}

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1
  PYO3_USE_ABI3_FORWARD_COMPATIBILITY: 1

jobs:
  checks:
    name: Format, Lint, Test, Package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --verbose

      - name: Check crate package contents
        run: cargo package --locked --list

  release-build:
    name: Release Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-release-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-release-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --verbose

      - name: Smoke test release binary
        run: |
          ./target/release/bee --version
          ./target/release/bee eval "1 + 1"

  release-assets:
    name: Release Asset (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    needs: [checks, release-build]
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: macos-13
            target: x86_64-apple-darwin
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create release archive
        run: |
          version="${GITHUB_REF#refs/tags/}"
          mkdir -p release
          cp "target/${{ matrix.target }}/release/bee" release/
          tar -czf "bee-${version}-${{ matrix.target }}.tar.gz" -C release bee

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: bee-${{ matrix.target }}
          path: bee-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: release-assets
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    env:
      CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Generate changelog
        run: |
          version="${GITHUB_REF#refs/tags/}"
          previous_tag="$(git describe --tags --abbrev=0 "${version}^" 2>/dev/null || true)"
          echo "## Changes in ${version}" > CHANGELOG.md
          if [ -n "$previous_tag" ]; then
            git log --pretty=format:"- %s" "${previous_tag}..${version}" >> CHANGELOG.md
          else
            git log --pretty=format:"- %s" "${version}" >> CHANGELOG.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          body_path: CHANGELOG.md
          files: release/**/bee-*.tar.gz
          draft: false
          prerelease: false

      - name: Install Rust
        if: env.CARGO_REGISTRY_TOKEN != ''
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        if: env.CARGO_REGISTRY_TOKEN != ''
        run: cargo publish --locked --token "$CARGO_REGISTRY_TOKEN"
