name: Performance

on:
  schedule:
    - cron: "0 2 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  RUST_BACKTRACE: 1

jobs:
  performance:
    name: Release Performance Checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-performance-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-performance-
            ${{ runner.os }}-cargo-

      - name: Build release binary
        run: cargo build --release

      - name: Run release benchmark checks
        run: |
          mkdir -p performance_reports
          cargo test --release --lib benchmark -- --nocapture \
            2>&1 | tee performance_reports/benchmark_module.log

      - name: Upload performance reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: performance-reports-${{ github.run_number }}
          path: performance_reports/
          retention-days: 30
