name: Performance Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # 每天 UTC 2:00 运行性能测试 (北京时间 10:00)
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - benchmarks
          - regression
          - quick

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  performance-tests:
    name: Performance Test Suite
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: llvm-tools-preview

    - name: Install cargo-llvm-cov
      run: curl -L https://github.com/taiki-e/cargo-llvm-cov/releases/latest/download/cargo-llvm-cov-linux.tar.gz | tar xz
      shell: bash

    - name: Cache cargo registry
      uses: actions/cache@v4
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v4
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v4
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Build release
      run: cargo build --release
      shell: bash

    - name: Run quick performance tests
      if: github.event.inputs.test_suite == 'quick' || github.event.inputs.test_suite == '' || github.event.inputs.test_suite == 'all'
      run: |
        echo "🚀 Running quick performance tests..."
        cargo test --lib benchmarks::startup::tests::test_cold_start_benchmark --release -- --nocapture
        cargo test --lib benchmarks::execution::tests::test_expression_eval_benchmark --release -- --nocapture

    - name: Run full benchmark suite
      if: github.event.inputs.test_suite == 'benchmarks' || github.event.inputs.test_suite == 'all'
      run: |
        echo "🚀 Running full benchmark suite..."
        cargo test --lib benchmarks --release -- --nocapture
      shell: bash

    - name: Run performance regression tests
      if: github.event.inputs.test_suite == 'regression' || github.event.inputs.test_suite == 'all'
      run: |
        echo "🔍 Running performance regression tests..."
        # 创建基线目录
        mkdir -p performance_baselines
        # 运行回归检测
        cargo test --lib performance_regression --release -- --nocapture
      shell: bash

    - name: Run comprehensive test suite
      if: github.event.inputs.test_suite == 'all'
      run: |
        echo "📊 Running comprehensive test suite..."
        # 运行所有性能相关测试
        cargo test --lib performance --release -- --nocapture
        cargo test --lib automation --release -- --nocapture
      shell: bash

    - name: Generate performance report
      if: always()
      run: |
        echo "📄 Generating performance report..."
        timestamp=$(date +%Y%m%d_%H%M%S)
        report_file="performance_report_${timestamp}.json"

        # 创建报告目录
        mkdir -p performance_reports

        # 运行基准测试并生成 JSON 报告
        cargo run --release --bin beejs-benchmark -- --format json --output "performance_reports/${report_file}" 2>/dev/null || true

        # 如果没有专门的基准测试工具，运行测试并输出结果
        cargo test --lib benchmarks --release -- --nocapture --report-time 2> "performance_reports/${report_file}" || true

        echo "Report generated: ${report_file}"
      shell: bash

    - name: Upload performance reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: performance-reports-${{ github.run_number }}
        path: performance_reports/
        retention-days: 30

    - name: Performance baseline check
      if: github.event_name == 'pull_request'
      run: |
        echo "🔍 Checking for performance regressions..."
        # 这里可以添加与基线数据对比的逻辑
        # 目前只是占位符
        echo "Baseline check completed"

    - name: Comment PR with results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      env:
        ISSUE_NUMBER: ${{ github.event.pull_request.number }}
      with:
        script: |
          const fs = require('fs');
          const path = './performance_reports';
          const issueNumber = process.env.ISSUE_NUMBER;

          let comment = '## Performance Test Results\\n\\n';

          if (fs.existsSync(path)) {
            const files = fs.readdirSync(path);
            if (files.length > 0) {
              comment += `✅ Performance tests completed\\n`;
              comment += `📄 Reports: ${files.length} file(s) generated\\n`;
              comment += `\\nView detailed reports in the workflow artifacts.\\n`;
            } else {
              comment += '⚠️ No performance reports generated\\n';
            }
          } else {
            comment += '⚠️ Performance test directory not found\\n';
          }

          if (issueNumber) {
            github.rest.issues.createComment({
              issue_number: parseInt(issueNumber),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }

    - name: Performance regression alert
      if: failure() && github.event_name != 'pull_request'
      run: |
        echo "⚠️ Performance regression detected!"
        echo "Please check the test results and investigate potential issues."
        # 这里可以添加通知逻辑 (Slack, Email, etc.)

    - name: Upload coverage to Codecov
      if: github.event.inputs.test_suite == 'all' || github.event.inputs.test_suite == ''
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        files: ./coverage/lcov.info
        flags: performance-tests
        name: codecov-umbrella
        fail_ci_if_error: false

    - name: Performance trend analysis
      if: github.event_name == 'schedule' || github.event.inputs.test_suite == 'all'
      run: |
        echo "📈 Analyzing performance trends..."
        # 这里可以添加历史趋势分析逻辑
        # 例如：与上次运行的数据对比，分析性能变化趋势
        timestamp=$(date +%Y%m%d_%H%M%S)
        echo "Trend analysis completed at ${timestamp}"
      shell: bash

    - name: Cleanup old reports
      if: always()
      run: |
        echo "🧹 Cleaning up old performance reports..."
        # 保留最近 7 天的报告
        find performance_reports -type f -mtime +7 -delete 2>/dev/null || true
        find performance_baselines -type f -mtime +30 -delete 2>/dev/null || true
        echo "Cleanup completed"
      shell: bash

  benchmark-comparison:
    name: Benchmark Comparison
    runs-on: ubuntu-latest
    needs: performance-tests
    if: github.event_name == 'pull_request'

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Download current performance reports
      uses: actions/download-artifact@v4
      with:
        name: performance-reports-${{ github.run_number }}
        path: current_reports

    - name: Download baseline reports
      uses: actions/download-artifact@v4
      with:
        name: performance-reports-${{ github.event.pull_request.base.sha }}
        path: baseline_reports
        continue-on-error: true

    - name: Compare benchmarks
      run: |
        echo "⚖️ Comparing current benchmarks with baseline..."
        if [ -d "baseline_reports" ] && [ "$(ls -A baseline_reports)" ]; then
          echo "✅ Baseline reports found. Running comparison..."
          # TODO: 实现实际的基准测试对比逻辑
          echo "Comparison completed successfully"
        else
          echo "⚠️ No baseline reports found. This may be the first run or baseline not available."
        fi
      shell: bash

    - name: Comment PR with comparison results
      if: always()
      uses: actions/github-script@v7
      env:
        ISSUE_NUMBER: ${{ github.event.pull_request.number }}
      with:
        script: |
          const fs = require('fs');

          let comment = '## Benchmark Comparison Results\\n\\n';

          if (fs.existsSync('./baseline_reports')) {
            comment += '✅ Comparison completed\\n';
            comment += '\\n📊 Detailed comparison will be available in the workflow logs.\\n';
          } else {
            comment += 'ℹ️ No baseline available for comparison\\n';
            comment += 'This may be the first performance test run.\\n';
          }

          if (process.env.ISSUE_NUMBER) {
            github.rest.issues.createComment({
              issue_number: parseInt(process.env.ISSUE_NUMBER),
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });
          }
