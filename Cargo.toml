[package]
name = "beejs"
version = "0.1.0"
edition = "2021"
authors = ["Beejs Team"]
description = "High-performance JavaScript/TypeScript runtime built with Rust and V8"
license = "MIT"

[dependencies]
# V8 - Google's high-performance JavaScript engine with Rust bindings
rusty_v8 = "0.20"

# CLI and argument parsing
clap = { version = "4.0", features = ["derive"] }
anyhow = "1.0"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

# Utilities
once_cell = "1.0"
chrono = { version = "0.4", features = ["serde"] }
num_cpus = "1.0"

# Testing
[dev-dependencies]
tempfile = "3.0"

[[bin]]
name = "beejs-benchmark"
path = "tools/benchmark_runner.rs"

[[bin]]
name = "beejs"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
