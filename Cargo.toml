[package]
name = "beejs"
version = "0.1.0"
edition = "2021"
authors = ["Henry Zhang"]
description = "High-performance JavaScript/TypeScript runtime built with Rust and V8"
license = "MIT"

[dependencies]
# V8 - Google's high-performance JavaScript engine with Rust bindings
rusty_v8 = "0.22"

# CLI and argument parsing
clap = { version = "4.0", features = ["derive"] }
anyhow = "1.0"
tokio = { version = "1.0", features = ["full"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
thiserror = "1.0"
crossbeam = "0.8"
memmap2 = "0.9"

# HTTP Server for Server mode
tiny_http = "0.12"

# WebSocket support
tokio-tungstenite = "0.21"
tungstenite = "0.21"

# Logging
tracing = "0.1"
tracing-subscriber = "0.3"

# Async utilities
futures = "0.3"
futures-util = "0.3"

# File watching for hot reload
notify = "6.1"
notify-debouncer-mini = "0.4"
walkdir = "2.4"

# Utilities
once_cell = "1.0"
chrono = { version = "0.4", features = ["serde"] }
num_cpus = "1.0"
regex = "1.0"
bincode = "1.3"
url = "2.0"
dirs = "5.0"

# Testing
[dev-dependencies]
tempfile = "3.0"
futures = "0.3"

# Async runtime
futures-util = "0.3"

[[bin]]
name = "beejs-benchmark"
path = "tools/benchmark_runner.rs"

[[bin]]
name = "beejs"
path = "src/main.rs"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
panic = "abort"
