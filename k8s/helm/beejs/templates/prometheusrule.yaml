{{- if and .Values.monitoring.enabled .Values.monitoring.prometheusRule.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: {{ include "beejs.fullname" . }}
  labels:
    {{- include "beejs.labels" . | nindent 4 }}
    {{- include "beejs.component" . | nindent 4 }}
spec:
  groups:
    - name: beejs.rules
      rules:
        - alert: BeejsDown
          expr: up{job="{{ include "beejs.fullname" . }}"} == 0
          for: 1m
          labels:
            severity: critical
          annotations:
            summary: "Beejs instance is down"
            description: "Beejs instance {{ $labels.instance }} has been down for more than 1 minute."

        - alert: BeejsHighCpuUsage
          expr: rate(container_cpu_usage_seconds_total{pod=~"{{ include "beejs.fullname" . }}-.*"}[5m]) * 100 > 80
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Beejs high CPU usage"
            description: "Beejs instance {{ $labels.instance }} CPU usage is above 80% for more than 5 minutes."

        - alert: BeejsHighMemoryUsage
          expr: container_memory_working_set_bytes{pod=~"{{ include "beejs.fullname" . }}-.*"} / container_spec_memory_limit_bytes > 0.9
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "Beejs high memory usage"
            description: "Beejs instance {{ $labels.instance }} memory usage is above 90% for more than 5 minutes."

        - alert: BeejsManyRestarts
          expr: increase(kube_pod_container_status_restarts_total{pod=~"{{ include "beejs.fullname" . }}-.*"}[1h]) > 5
          for: 0m
          labels:
            severity: warning
          annotations:
            summary: "Beejs container restarting frequently"
            description: "Beejs container {{ $labels.instance }} has restarted {{ $value }} times in the last hour."

        - alert: BeejsHighErrorRate
          expr: rate(beejs_http_requests_total{status=~"5.."}[5m]) / rate(beejs_http_requests_total[5m]) > 0.1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "Beejs high error rate"
            description: "Beejs instance {{ $labels.instance }} error rate is above 10% for more than 5 minutes."
{{- end }}
