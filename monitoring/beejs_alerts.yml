# Alert rules for Beejs runtime monitoring
# These rules define when to trigger alerts based on performance metrics

groups:
  - name: beejs.runtime.alerts
    rules:
      # High CPU usage alert
      - alert: BeejsHighCPU
        expr: rate(beejs_cpu_usage_seconds_total[5m]) * 100 > 80
        for: 2m
        labels:
          severity: warning
          service: beejs
        annotations:
          summary: "Beejs runtime high CPU usage"
          description: "Beejs instance {{ $labels.instance }} has CPU usage above 80% for more than 2 minutes. Current value: {{ $value }}%"

      # Critical CPU usage alert
      - alert: BeejsCriticalCPU
        expr: rate(beejs_cpu_usage_seconds_total[5m]) * 100 > 95
        for: 1m
        labels:
          severity: critical
          service: beejs
        annotations:
          summary: "Beejs runtime critical CPU usage"
          description: "Beejs instance {{ $labels.instance }} has critical CPU usage above 95%. Current value: {{ $value }}%"

      # High memory usage alert
      - alert: BeejsHighMemory
        expr: beejs_memory_usage_bytes / beejs_memory_limit_bytes * 100 > 80
        for: 2m
        labels:
          severity: warning
          service: beejs
        annotations:
          summary: "Beejs runtime high memory usage"
          description: "Beejs instance {{ $labels.instance }} has memory usage above 80%. Current value: {{ $value }}%"

      # Critical memory usage alert
      - alert: BeejsCriticalMemory
        expr: beejs_memory_usage_bytes / beejs_memory_limit_bytes * 100 > 90
        for: 1m
        labels:
          severity: critical
          service: beejs
        annotations:
          summary: "Beejs runtime critical memory usage"
          description: "Beejs instance {{ $labels.instance }} has critical memory usage above 90%. Current value: {{ $value }}%"

      # High error rate alert
      - alert: BeejsHighErrorRate
        expr: rate(beejs_errors_total[5m]) > 10
        for: 2m
        labels:
          severity: warning
          service: beejs
        annotations:
          summary: "Beejs runtime high error rate"
          description: "Beejs instance {{ $labels.instance }} has error rate above 10 errors/second. Current rate: {{ $value }} errors/sec"

      # Script execution failures
      - alert: BeejsScriptFailures
        expr: rate(beejs_script_failures_total[5m]) > 5
        for: 1m
        labels:
          severity: critical
          service: beejs
        annotations:
          summary: "Beejs script execution failures"
          description: "Beejs instance {{ $labels.instance }} has high script failure rate. Current rate: {{ $value }} failures/sec"

      # V8 GC pressure alert
      - alert: BeejsV8GCPressure
        expr: rate(beejs_v8_gc_duration_seconds_sum[5m]) / rate(beejs_v8_gc_duration_seconds_count[5m]) > 0.1
        for: 3m
        labels:
          severity: warning
          service: beejs
        annotations:
          summary: "Beejs V8 GC pressure"
          description: "Beejs instance {{ $labels.instance }} has high GC pressure. Average GC time: {{ $value }}s"

      # Worker pool saturation
      - alert: BeejsWorkerPoolSaturation
        expr: beejs_active_workers / beejs_max_workers * 100 > 90
        for: 2m
        labels:
          severity: warning
          service: beejs
        annotations:
          summary: "Beejs worker pool saturation"
          description: "Beejs instance {{ $labels.instance }} has worker pool utilization above 90%. Current utilization: {{ $value }}%"

      # Instance down alert
      - alert: BeejsInstanceDown
        expr: up{job="beejs-runtime"} == 0
        for: 1m
        labels:
          severity: critical
          service: beejs
        annotations:
          summary: "Beejs instance down"
          description: "Beejs instance {{ $labels.instance }} is down"

  - name: beejs.performance.alerts
    rules:
      # High response time alert
      - alert: BeejsHighResponseTime
        expr: beejs_avg_response_time_ms > 1000
        for: 3m
        labels:
          severity: warning
          service: beejs
        annotations:
          summary: "Beejs high response time"
          description: "Beejs instance {{ $labels.instance }} has average response time above 1000ms. Current value: {{ $value }}ms"

      # Low throughput alert
      - alert: BeejsLowThroughput
        expr: beejs_requests_per_second < 10
        for: 5m
        labels:
          severity: warning
          service: beejs
        annotations:
          summary: "Beejs low throughput"
          description: "Beejs instance {{ $labels.instance }} has low throughput. Current value: {{ $value }} requests/sec"

      # Startup time too long
      - alert: BeejsSlowStartup
        expr: beejs_startup_time_ms > 5000
        for: 0m
        labels:
          severity: info
          service: beejs
        annotations:
          summary: "Beejs slow startup"
          description: "Beejs instance {{ $labels.instance }} startup time is above 5000ms. Current value: {{ $value }}ms"
