# Beejs GitHub Actions Integration
# This workflow runs tests using Beejs runtime

name: Beejs Test

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  BEEJS_VERSION: 'latest'

jobs:
  test:
    name: Test with Beejs
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install Beejs Runtime
      run: |
        # Download and install Beejs
        curl -L https://github.com/beejs-team/beejs/releases/download/v0.1.0/beejs-linux-x64.tar.gz -o beejs.tar.gz
        tar -xzf beejs.tar.gz
        chmod +x beejs
        sudo mv beejs /usr/local/bin/

    - name: Verify Beejs Installation
      run: |
        beejs --version
        beejs --help

    - name: Install dependencies
      run: |
        npm ci
        # Install project dependencies if any
        if [ -f package.json ]; then
          npm install
        fi

    - name: Run Beejs Tests
      run: |
        echo "Running Beejs test suite..."
        beejs test --reporter=json --output=test-results.json

    - name: Run Performance Benchmarks
      run: |
        echo "Running performance benchmarks..."
        beejs run benchmarks/comprehensive_benchmark.js

    - name: Upload Test Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: beejs-test-results-${{ matrix.node-version }}
        path: test-results.json

    - name: Upload Performance Reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: beejs-performance-reports-${{ matrix.node-version }}
        path: performance-*.json

  build:
    name: Build with Beejs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Beejs Runtime
      run: |
        curl -L https://github.com/beejs-team/beejs/releases/download/v0.1.0/beejs-linux-x64.tar.gz -o beejs.tar.gz
        tar -xzf beejs.tar.gz
        chmod +x beejs
        sudo mv beejs /usr/local/bin/

    - name: Build Application
      run: |
        echo "Building application with Beejs..."
        # Example: Build TypeScript
        if [ -f tsconfig.json ]; then
          beejs run build.ts
        fi

        # Example: Bundle JavaScript
        if [ -f src/index.js ]; then
          beejs bundle src/index.js --outfile dist/bundle.js
        fi

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: build-artifacts
        path: dist/

  lint:
    name: Lint with Beejs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Beejs Runtime
      run: |
        curl -L https://github.com/beejs-team/beejs/releases/download/v0.1.0/beejs-linux-x64.tar.gz -o beejs.tar.gz
        tar -xzf beejs.tar.gz
        chmod +x beejs
        sudo mv beejs /usr/local/bin/

    - name: Run Linting
      run: |
        echo "Running linter..."
        # Example: Lint JavaScript/TypeScript
        if [ -f .eslintrc.js ]; then
          beejs run node_modules/.bin/eslint src/ --format=json --output-file=eslint-results.json
        fi

    - name: Upload Lint Results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: lint-results
        path: eslint-results.json

  security:
    name: Security Scan with Beejs
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Beejs Runtime
      run: |
        curl -L https://github.com/beejs-team/beejs/releases/download/v0.1.0/beejs-linux-x64.tar.gz -o beejs.tar.gz
        tar -xzf beejs.tar.gz
        chmod +x beejs
        sudo mv beejs /usr/local/bin/

    - name: Run Security Scan
      run: |
        echo "Running security scan..."
        # Example: Scan for vulnerabilities
        beejs run scripts/security-scan.js

    - name: Upload Security Report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-report
        path: security-report.json
